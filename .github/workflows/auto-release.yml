name: Auto Draft Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  draft-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Get version and sha
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="v${VERSION}-${SHORT_SHA}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "zip_name=reqx-${TAG}.zip" >> "$GITHUB_OUTPUT"

      - name: Create zip
        run: zip -r ${{ steps.meta.outputs.zip_name }} ReqX/

      - name: Generate release notes from commits
        id: notes
        run: |
          # 이전 태그 찾기 (없으면 전체 히스토리)
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi

          # 커밋 메시지에서 릴리스 노트 생성
          {
            echo "## Changes"
            echo ""
            git log $RANGE --pretty=format:"- %s" --no-merges | grep -v "^- Co-Authored-By" | while read -r line; do
              echo "$line"
            done
            echo ""
            echo ""
            echo "## Details"
            echo ""
            git log $RANGE --pretty=format:"### %s%n%n%b" --no-merges | grep -v "^Co-Authored-By" | sed '/^$/N;/^\n$/d'
            echo ""
            echo "---"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG:-$(git rev-list --max-parents=0 HEAD | head -1)}...${{ steps.meta.outputs.tag }}"
          } > release-notes.md

          cat release-notes.md

      - name: Delete existing draft with same tag (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ steps.meta.outputs.tag }}" --yes 2>/dev/null || true
          git push origin --delete "refs/tags/${{ steps.meta.outputs.tag }}" 2>/dev/null || true

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" \
            --title "ReqX ${{ steps.meta.outputs.tag }}" \
            --draft \
            --notes-file release-notes.md \
            "${{ steps.meta.outputs.zip_name }}"
